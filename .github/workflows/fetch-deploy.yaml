name: Deploy Scripts

on: 
    push: 
        branches: 
            - main


jobs: 
    deploy-scripts:
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Deploy.sh directly
              env:
                GH_TOKEN: ${{ secrets.GH_PAT }}
              run: |
                curl -L \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3.raw" \
                -o deploy.sh \
                "https://github.com/api/v3/repos/anithajois/gh_env/scripts/deploy.sh"

             


