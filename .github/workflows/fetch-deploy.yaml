name: Deploy Scripts

on: 
    push: 
        branches: 
            - main


jobs: 
    deploy-scripts:
        runs-on: ubuntu-latest
        steps:
            - name: Clone gh_env repo
              uses: actions/checkout@v3
              with:
                repository: anithajois/gh_env
                token: ${{ secrets.GH_PAT }}
                path: gh_env

            - name: Copy deploy.sh
              run: |
                echo ${{ secrets.GH_PAT }}
                cp gh_env/scripts/deploy.sh ./deploy.sh
                rm -rf gh_env
                
              



