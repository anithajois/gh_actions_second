name: Deploy Scripts

on: 
    push: 
        branches: 
            - main


jobs: 
    deploy-scripts:
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Deploy.sh directly
              uses: actions/checkout@v3
              env:
                GH_TOKEN: ${{ secrets.GH_PAT }}
                run: |
                    git clone https://outh2:$GH_TOKEN@github.com/anithajois/gh_env.git
                    cd gh_env/scripts/deploy.sh
                    cp gh_env/scripts/deploy.sh ./aws/tmp_deploy.sh

