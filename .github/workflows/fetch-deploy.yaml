name: Copy Deploy Script from gh_env

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  copy-deploy-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout THIS repo (gh_actions_second) - target
      - name: Checkout Target Repo (gh_actions_second)
        uses: actions/checkout@v4

      # Step 2: Checkout the SOURCE repo (gh_env) into a subfolder
      - name: Checkout Source Repo (gh_env)
        uses: actions/checkout@v4
        with:
          repository: anithajois/gh_env
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: source_repo

      # Step 3: Verify deploy.sh exists in source repo
      - name: Verify deploy.sh exists
        run: |
          if [ ! -f "source_repo/scripts/deploy.sh" ]; then
            echo "Error: scripts/deploy.sh not found in gh_env!"
            exit 1
          fi
          echo "scripts/deploy.sh found successfully."

      # Step 4: Copy deploy.sh into this repo (gh_actions_second)
      - name: Copy deploy.sh to this Repo
        uses: actions/upload-artifact@v4
        with:
            name: scripts
            path: scripts
        